# Application Configuration
spring.application.name=library-management-system
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Initialize database with schema and data
spring.sql.init.mode=${INIT_MODE:always}
spring.sql.init.continue-on-error=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.library=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:INFO}

# Server Configuration
server.error.include-message=always
server.error.include-binding-errors=always

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
