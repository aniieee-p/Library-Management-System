<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Smart Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-book-reader"></i> Smart Library
            </a>
            <div class="ms-auto">
                <span class="navbar-text text-white me-3">
                    <i class="fas fa-user"></i> <span id="userName"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" onclick="showSection('browse')">
                                <i class="fas fa-book"></i> Browse Books
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showSection('mybooks')">
                                <i class="fas fa-bookmark"></i> My Books
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <!-- Browse Books Section -->
                <div id="browse" class="content-section">
                    <h2 class="mt-4 mb-4">Browse Books</h2>
                    
                    <!-- Search Bar -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" id="searchInput" placeholder="Search by title, author, or category...">
                                <button class="btn btn-primary" onclick="searchBooks()">
                                    <i class="fas fa-search"></i> Search
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Books Grid -->
                    <div class="row" id="booksGrid"></div>
                </div>

                <!-- My Books Section -->
                <div id="mybooks" class="content-section" style="display:none;">
                    <h2 class="mt-4 mb-4">My Issued Books</h2>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Book Title</th>
                                    <th>Author</th>
                                    <th>Issue Date</th>
                                    <th>Due Date</th>
                                    <th>Status</th>
                                    <th>Fine</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="myBooksTable"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080/api'
            : `${window.location.origin}/api`;
        let currentUser = null;

        // Check authentication
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = '/static/login.html';
                return;
            }
            currentUser = user;
            document.getElementById('userName').textContent = user.name;
            loadBooks();
        };

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/static/login.html';
        }

        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            
            if (section === 'browse') loadBooks();
            else if (section === 'mybooks') loadMyBooks();
        }

        async function loadBooks() {
            try {
                const response = await fetch(`${API_URL}/books`);
                const result = await response.json();
                
                if (result.success) {
                    displayBooks(result.data);
                }
            } catch (error) {
                console.error('Error loading books:', error);
            }
        }

        function displayBooks(books) {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = books.map(book => `
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${book.title}</h5>
                            <p class="card-text">
                                <strong>Author:</strong> ${book.author}<br>
                                <strong>Category:</strong> ${book.category}<br>
                                <strong>Available:</strong> ${book.availableQuantity} / ${book.quantity}
                            </p>
                            ${book.availableQuantity > 0 ? 
                                `<button class="btn btn-primary btn-sm" onclick="issueBook(${book.id})">
                                    <i class="fas fa-book"></i> Issue Book
                                </button>` :
                                `<button class="btn btn-secondary btn-sm" disabled>Not Available</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            if (!query) {
                loadBooks();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/books/search?query=${encodeURIComponent(query)}`);
                const result = await response.json();
                
                if (result.success) {
                    displayBooks(result.data);
                }
            } catch (error) {
                console.error('Error searching books:', error);
            }
        }

        async function issueBook(bookId) {
            if (!confirm('Do you want to issue this book?')) return;

            try {
                const response = await fetch(`${API_URL}/issues`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        bookId: bookId
                    })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Book issued successfully! Due date: 14 days from today.');
                    loadBooks();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('Error issuing book:', error);
                alert('Failed to issue book');
            }
        }

        async function loadMyBooks() {
            try {
                const response = await fetch(`${API_URL}/issues/user/${currentUser.id}`);
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('myBooksTable');
                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="text-center">No books issued</td></tr>';
                    } else {
                        tbody.innerHTML = result.data.map(issue => `
                            <tr>
                                <td>${issue.book.title}</td>
                                <td>${issue.book.author}</td>
                                <td>${issue.issueDate}</td>
                                <td>${issue.dueDate}</td>
                                <td>
                                    <span class="badge bg-${issue.status === 'ISSUED' ? 'warning' : 'success'}">
                                        ${issue.status}
                                    </span>
                                </td>
                                <td>₹${issue.fine}</td>
                                <td>
                                    ${issue.status === 'ISSUED' ? 
                                        `<button class="btn btn-sm btn-success" onclick="returnBook(${issue.id})">
                                            <i class="fas fa-undo"></i> Return
                                        </button>` :
                                        'Returned'
                                    }
                                </td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading my books:', error);
            }
        }

        async function returnBook(issueId) {
            if (!confirm('Do you want to return this book?')) return;

            try {
                const response = await fetch(`${API_URL}/issues/${issueId}/return`, {
                    method: 'PUT'
                });

                const result = await response.json();
                if (result.success) {
                    const fine = result.data.fine;
                    if (fine > 0) {
                        alert(`Book returned successfully! Fine: ₹${fine}`);
                    } else {
                        alert('Book returned successfully!');
                    }
                    loadMyBooks();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('Error returning book:', error);
                alert('Failed to return book');
            }
        }

        // Allow search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBooks();
            }
        });
    </script>
</body>
</html>
